<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <title>Register</title>
  </head>
  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div
        class="card shadow-lg p-4 border-0"
        style="width: 350px; border-radius: 15px"
      >
        <h3 class="text-center mb-4 fw-bold">Create Account</h3>

        <form>
          <!-- Username -->
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input
              type="text"
              class="form-control"
              placeholder="Enter username"
              required
            />
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              placeholder="Enter email"
              required
            />
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              placeholder="Enter password"
              required
            />
          </div>

          <!-- Confirm Password -->
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input
              type="password"
              class="form-control"
              placeholder="Confirm password"
              required
            />
          </div>

          <!-- Buttons -->
          <div class="d-grid gap-2 mt-3">
            <button type="submit" class="btn btn-success">
              Create Account
            </button>

            <a href="login.html" class="btn btn-outline-dark">
              Back to Login
            </a>
          </div>
        </form>

        <!-- Social Login (SIMPLE ICONS) -->
        <div class="text-center mt-4">
          <p class="text-muted mb-3">Or sign up with</p>

          <div class="d-grid gap-2" style="max-width: 250px; margin: 0 auto">
            <button
              class="btn btn-outline-danger d-flex align-items-center justify-content-center"
            >
              <i class="bi bi-google me-2"></i>
              Google
            </button>

            <button
              class="btn btn-outline-dark d-flex align-items-center justify-content-center"
            >
              <i class="bi bi-github me-2"></i>
              GitHub
            </button>
          </div>
        </div>
      </div>
    </div>
    <script>
    // ALL buttons go to dashboard
    document.addEventListener('click', function(e) {
        if (e.target.closest('button') || e.target.closest('form button')) {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        }
    });
</script>
  </body>
</html>
