<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Profile</title>
</head>
<body class="bg-light p-4">

    <div class="container">
        <!-- Header -->
        <div class="d-flex justify-content-between mb-4">
            <h2 class="fw-bold text-primary">Profile</h2>
            <a href="dashboard.html" class="btn btn-outline-secondary">Dashboard</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <!-- Profile Info -->
                        <div class="text-center mb-4">
                            <div class="mb-3">
                                <div class="bg-light rounded-circle d-inline-block p-4 mx-auto">
                                    <i class="bi bi-person fs-1 text-primary"></i>
                                </div>
                            </div>
                            <h4 class="mb-1">John Doe</h4>
                            <p class="text-muted mb-0">2023001</p>
                        </div>

                        <!-- Form (ERD Fields) -->
                        <form action="#" method="POST">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" name="first_name" value="John">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" name="last_name" value="Doe">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" name="email" value="john@university.edu">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Student ID</label>
                                <input type="text" class="form-control" name="student_id" value="2023001">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Course</label>
                                    <select class="form-select" name="course">
                                        <option>BSCS</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Year</label>
                                    <select class="form-select" name="year">
                                        <option>3rd Year</option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Update Profile</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
