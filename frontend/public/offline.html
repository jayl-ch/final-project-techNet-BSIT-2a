<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4F46E5" />
    <title>TaskWise Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0f172a;
        --card: #111827;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #4f46e5;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 45%);
        color: var(--text);
      }
      .card {
        max-width: 420px;
        padding: 32px;
        background: var(--card);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 16px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.55);
        text-align: left;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        letter-spacing: 0.3px;
      }
      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.5;
      }
      button {
        border: none;
        background: var(--accent);
        color: #fff;
        padding: 10px 16px;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
      }
      button:focus-visible {
        outline: 2px solid #c7d2fe;
        outline-offset: 2px;
      }
      .meta {
        margin-top: 16px;
        font-size: 12px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>
        TaskWise cannot reach the network right now. Check your connection and
        try again.
      </p>
      <button type="button" onclick="window.location.reload()">
        Try again
      </button>
      <div class="meta">Offline mode keeps your app shell ready.</div>
    </main>
  </body>
</html>
